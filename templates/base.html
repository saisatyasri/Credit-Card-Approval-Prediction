<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}CreditAI — Credit Card Approval Prediction{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-banking">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <i class="bi bi-credit-card-2-front-fill fs-4"></i>
        <span>CreditAI</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
              <i class="bi bi-house-fill me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/predict' %}active{% endif %}" href="/predict">
              <i class="bi bi-robot me-1"></i>Predict
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="/history">
              <i class="bi bi-clock-history me-1"></i>History
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer-banking text-center py-3 mt-5">
    <div class="container">
      <small>
        <i class="bi bi-shield-lock-fill me-1"></i>
        Credit Card Approval Prediction &mdash; Machine Learning Portfolio Project
        &nbsp;|&nbsp;
        <span class="text-warning">IBM Watson ML</span> &nbsp;&bull;&nbsp; Flask &nbsp;&bull;&nbsp; XGBoost
      </small>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
